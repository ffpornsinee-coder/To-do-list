<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labubu To-Do List & Dashboard</title>
    <style>
        /* ==========================================
           1. ตั้งค่าตัวแปรสีสไตล์ลาบูบู้ (Labubu Theme)
           ========================================== */
        :root {
            --bg-color: #f7ede2; /* สีครีมพาสเทลสบายตา สไตล์เอิร์ธโทน */
            --card-bg: #ffffff;
            --text-color: #4a3e3d; /* สีน้ำตาลเข้ม ดูละมุนกว่าสีดำสนิท */
            --text-muted: #8a7a78;
            --border-color: #e5d4c0;
            --primary-color: #f28482; /* สีชมพูอมส้มสไตล์ลาบูบู้ */
            --primary-hover: #f15bb5;
            --success-color: #84a59d; /* สีเขียวมินต์หม่น */
            --warning-color: #f77f00;
            --danger-color: #d62828;
            --low-priority: #d8e2dc;
            --medium-priority: #f1c0e8;
            --high-priority: #f28482;
        }

        /* ตัวแปรสีสำหรับโหมดมืด (Dark Labubu) */
        [data-theme="dark"] {
            --bg-color: #2b2524; /* สีน้ำตาลเข้มขนนุ่ม */
            --card-bg: #3c3332;
            --text-color: #f7ede2;
            --text-muted: #bdafad;
            --border-color: #524645;
            --primary-color: #f28482;
            --primary-hover: #f59e9d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Prompt';
        }

        /* ==========================================
           2. ตกแต่งพื้นหลังลายฟันหยักลาบูบู้ (Monster Teeth)
           ========================================== */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            padding: 20px;
            
            /* ใช้เทคนิค CSS คำนวณเส้นตรงเฉียงตัดกันจนเกิดเป็นลายฟันมอนสเตอร์ */
            background-image: 
                linear-gradient(45deg, var(--border-color) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--border-color) 25%, transparent 25%);
            background-size: 30px 30px;
            background-repeat: repeat-x;
            background-position: top center;
            padding-top: 60px; /* เว้นระยะด้านบนไม่ให้ลายทับเนื้อหา */
            
            position: relative;
            min-height: 100vh;
        }

        /* 🎪 เพิ่มปุ่มคาแรคเตอร์ลาบูบู้ดุ๊กดิ๊กแอบอยู่ที่มุมขวาล่างของจอ */
        body::after {
            content: "🦷 LABUBU";
            font-size: 11px;
            font-weight: bold;
            color: white;
            text-align: center;
            line-height: 70px;
            
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 75px;
            height: 75px;
            background-color: var(--primary-color);
            border-radius: 50% 50% 42% 42%; /* ดัดทรงให้คล้ายหัวอาร์ตทอย */
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 999;
            pointer-events: none; /* ป้องกันไม่ให้บล็อกการกดปุ่มอื่นด้านหลัง */
            
            /* เล่นแอนิเมชันกระโดด */
            animation: labubuBounce 2s infinite ease-in-out;
        }

        /* แอนิเมชันขยับขึ้นลงน่ารักๆ */
        @keyframes labubuBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ==========================================
           3. ส่วนประกอบหน้าเว็บ (UI Components)
           ========================================== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px dashed var(--border-color);
        }

        .theme-btn {
            padding: 8px 16px;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.2s;
        }

        .theme-btn:hover {
            background-color: var(--primary-hover);
        }

        /* แผงควบคุมแดชบอร์ด */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px; /* ปรับดีไซน์ให้โค้งมนสไตล์ของเล่น */
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            text-align: center;
            border: 2px solid var(--border-color);
            border-left: 6px solid var(--primary-color);
        }

        .card.success-card { border-left-color: var(--success-color); }
        .card.warning-card { border-left-color: var(--warning-color); }
        .card.danger-card { border-left-color: var(--danger-color); }

        .card h3 {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .card .value {
            font-size: 28px;
            font-weight: bold;
        }

        .subject-report {
            font-size: 12px;
            text-align: left;
            margin-top: 5px;
            max-height: 100px;
            overflow-y: auto;
        }

        /* จัดหน้าสองคอลัมน์ */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        form, .filter-box {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 2px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-bg);
            color: var(--text-color);
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
        }

        button.btn {
            width: 100%;
            padding: 12px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* สไตล์รายการการ์ดงาน */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .task-item {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-left: 6px solid var(--primary-color);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .priority-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            color: #333;
        }
        .p-low { background-color: var(--low-priority); }
        .p-medium { background-color: var(--medium-priority); }
        .p-high { background-color: var(--high-priority); color: white; }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .task-title { font-weight: bold; font-size: 16px; }
        .task-details { font-size: 13px; color: var(--text-muted); }
        
        .task-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }
        .btn-edit { background-color: var(--warning-color); }
        .btn-delete { background-color: var(--danger-color); }

        .clear-all-btn {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ส่วนหัวโปรแกรม -->
    <header>
        <div>
            <h1>🦷 LABUBU Task Manager</h1>
            <p style="color: var(--text-muted);">บันทึกการบ้านและงานเร่งด่วน สไตล์มอนสเตอร์ตัวซน</p>
        </div>
        <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">โหมดมืด 🌙</button>
    </header>

    <!-- หน้า Dashboard สรุปงาน -->
    <div class="dashboard">
        <div class="card">
            <h3>ภารกิจทั้งหมด</h3>
            <div class="value" id="dashTotal">0</div>
        </div>
        <div class="card warning-card">
            <h3>กำลังดองอยู่</h3>
            <div class="value" id="dashPending">0</div>
        </div>
        <div class="card success-card">
            <h3>เคลียร์เรียบร้อย</h3>
            <div class="value" id="dashCompleted">0</div>
        </div>
        <div class="card danger-card">
            <h3>วิกฤต (ใน 3 วัน)</h3>
            <div class="value" id="dashUrgent">0</div>
        </div>
        <div class="card">
            <h3>แยกตามรายวิชา</h3>
            <div class="subject-report" id="dashSubjects">ไม่มีข้อมูล</div>
        </div>
    </div>

    <!-- โครงสร้างสองฝั่ง -->
    <div class="main-layout">
        <!-- ฝั่งซ้าย: แบบฟอร์มกรอก -->
        <div>
            <h2 style="margin-bottom:10px;" id="formTitle">➕ เพิ่มการบ้านใหม่</h2>
            <form id="taskForm" onsubmit="saveTask(event)">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label>ชื่องาน / หัวข้อการบ้าน *</label>
                    <input type="text" id="taskName" required placeholder="เช่น ทำแบบฝึกหัดหน้า 45">
                </div>
                <div class="form-group">
                    <label>รายวิชา *</label>
                    <input type="text" id="taskSubject" required placeholder="เช่น เทคโนโลยี, คณิตศาสตร์">
                </div>
                <div class="form-group">
                    <label>เดดไลน์กำหนดส่ง *</label>
                    <input type="date" id="taskDeadline" required>
                </div>
                <div class="form-group">
                    <label>ระดับความเอากระเด้ง (ความสำคัญ)</label>
                    <select id="taskPriority">
                        <option value="ต่ำ">ต่ำ (ชิลๆ)</option>
                        <option value="ปานกลาง" selected>ปานกลาง (รีบทำก็ดี)</option>
                        <option value="สูง">สูง (ไฟลุก! 🚨)</option>
                    </select>
                </div>
                <button type="submit" class="btn" id="submitBtn">บันทึกภารกิจ</button>
                <button type="button" class="btn" id="cancelEditBtn" style="background-color: var(--text-muted); margin-top: 5px; display: none;" onclick="resetForm()">ยกเลิกการแก้ไข</button>
            </form>
        </div>

        <!-- ฝั่งขวา: รายการและการกรองข้อมูล -->
        <div>
            <h2 style="margin-bottom:10px;">🔍 เจาะลึกค้นหา</h2>
            <div class="filter-box">
                <div class="form-group">
                    <input type="text" id="searchName" placeholder="พิมพ์ชื่องานเพื่อค้นหา..." oninput="renderTasks()">
                </div>
                <div class="filter-grid">
                    <select id="filterSubject" onchange="renderTasks()">
                        <option value="">-- ทุกวิชา --</option>
                    </select>
                    <select id="filterStatus" onchange="renderTasks()">
                        <option value="">-- ทุกสถานะ --</option>
                        <option value="ยังไม่ทำ">ยังไม่ทำ</option>
                        <option value="กำลังทำ">กำลังทำ</option>
                        <option value="เสร็จแล้ว">เสร็จแล้ว</option>
                    </select>
                    <select id="filterPriority" onchange="renderTasks()">
                        <option value="">-- ความสำคัญ --</option>
                        <option value="ต่ำ">ต่ำ</option>
                        <option value="ปานกลาง">ปานกลาง</option>
                        <option value="สูง">สูง</option>
                    </select>
                </div>
            </div>

            <h2 style="margin-bottom:10px;">📋 ลำดับภารกิจ (งานด่วนขึ้นก่อน)</h2>
            <button class="clear-all-btn" onclick="clearCompletedTasks()">🧹 กำจัดงานที่เสร็จแล้วทั้งหมด</button>
            
            <div id="taskList"></div>
        </div>
    </div>
</div>

<!-- ==========================================
     4. ระบบตรรกะคำนวณเบื้องหลัง (JavaScript)
     ========================================== -->
<script>
    let tasks = [];

    // เริ่มทำงานเมื่อเปิดหน้าเว็บ
    window.onload = function() {
        const storedTasks = localStorage.getItem('labubu_tasks');
        if (storedTasks) { tasks = JSON.parse(storedTasks); }
        
        const savedTheme = localStorage.getItem('labubu_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeToggle').innerText = savedTheme === 'dark' ? 'โหมดสว่าง ☀️' : 'โหมดมืด 🌙';

        updateSubjectFilters();
        renderTasks();
    };

    // ระบบสลับโหมดมืด/สว่าง
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        let newTheme = currentTheme === 'light' ? 'dark' : 'light';
        
        document.getElementById('themeToggle').innerText = newTheme === 'dark' ? 'โหมดสว่าง ☀️' : 'โหมดมืด 🌙';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('labubu_theme', newTheme);
    }

    // ฟังก์ชันเซฟและแก้ไขข้อมูล
    function saveTask(event) {
        event.preventDefault();
        const id = document.getElementById('taskId').value;
        const name = document.getElementById('taskName').value.trim();
        const subject = document.getElementById('taskSubject').value.trim();
        const deadline = document.getElementById('taskDeadline').value;
        const priority = document.getElementById('taskPriority').value;

        if (id) {
            const index = tasks.findIndex(t => t.id === id);
            if (index !== -1) {
                tasks[index].name = name;
                tasks[index].subject = subject;
                tasks[index].deadline = deadline;
                tasks[index].priority = priority;
            }
        } else {
            tasks.push({
                id: Date.now().toString(),
                name: name,
                subject: subject,
                deadline: deadline,
                priority: priority,
                status: 'ยังไม่ทำ'
            });
        }

        localStorage.setItem('labubu_tasks', JSON.stringify(tasks));
        resetForm();
        updateSubjectFilters();
        renderTasks();
    }

    // นำค่าเก่ากลับขึ้นฟอร์มเพื่อแก้ไข
    function editTask(id) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;

        document.getElementById('taskId').value = task.id;
        document.getElementById('taskName').value = task.name;
        document.getElementById('taskSubject').value = task.subject;
        document.getElementById('taskDeadline').value = task.deadline;
        document.getElementById('taskPriority').value = task.priority;

        document.getElementById('formTitle').innerText = '✏️ แก้ไขข้อมูลภารกิจ';
        document.getElementById('submitBtn').innerText = 'อัปเดตภารกิจ';
        document.getElementById('cancelEditBtn').style.display = 'block';
    }

    function resetForm() {
        document.getElementById('taskId').value = '';
        document.getElementById('taskForm').reset();
        document.getElementById('formTitle').innerText = '➕ เพิ่มการบ้านใหม่';
        document.getElementById('submitBtn').innerText = 'บันทึกภารกิจ';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }

    function deleteTask(id) {
        if (confirm('จะลบงานนี้จริง ๆ หรอเจ้ามนุษย์?')) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('labubu_tasks', JSON.stringify(tasks));
            updateSubjectFilters();
            renderTasks();
        }
    }

    function updateStatus(id, newStatus) {
        const index = tasks.findIndex(t => t.id === id);
        if (index !== -1) {
            tasks[index].status = newStatus;
            localStorage.setItem('labubu_tasks', JSON.stringify(tasks));
            renderTasks();
        }
    }

    function clearCompletedTasks() {
        const count = tasks.filter(t => t.status === 'เสร็จแล้ว').length;
        if (count === 0) return alert('ไม่มีงานที่ทำเสร็จค้างไว้เลยครับ!');
        if (confirm(`ต้องการกวาดล้างงานที่ทำเสร็จแล้วทั้ง ${count} งานออกไปไหม?`)) {
            tasks = tasks.filter(t => t.status !== 'เสร็จแล้ว');
            localStorage.setItem('labubu_tasks', JSON.stringify(tasks));
            updateSubjectFilters();
            renderTasks();
        }
    }

    function updateSubjectFilters() {
        const select = document.getElementById('filterSubject');
        const saved = select.value;
        const subjects = [...new Set(tasks.map(t => t.subject))];
        select.innerHTML = '<option value="">-- ทุกวิชา --</option>';
        subjects.forEach(sub => {
            const opt = document.createElement('option');
            opt.value = sub; opt.innerText = sub;
            select.appendChild(opt);
        });
        select.value = saved;
    }

    // ประมวลผลคัดกรอง เรียงลำดับ และแสดงการ์ดงานบนจอ
    function renderTasks() {
        const listDiv = document.getElementById('taskList');
        const search = document.getElementById('searchName').value.toLowerCase();
        const fSub = document.getElementById('filterSubject').value;
        const fStat = document.getElementById('filterStatus').value;
        const fPri = document.getElementById('filterPriority').value;

        // เรียงลำดับวันส่ง (ใกล้สุดขึ้นก่อน)
        let result = [...tasks].sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

        // กรองข้อมูลตามที่ค้นหา
        result = result.filter(t => {
            return t.name.toLowerCase().includes(search) &&
                   (fSub === '' || t.subject === fSub) &&
                   (fStat === '' || t.status === fStat) &&
                   (fPri === '' || t.priority === fPri);
        });

        listDiv.innerHTML = '';
        if (result.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding:20px;">ไม่มีงานที่ตรงตามเงื่อนไขเลย ชิลมาก!</p>';
        } else {
            result.forEach(t => {
                let pClass = t.priority === 'สูง' ? 'p-high' : (t.priority === 'ปานกลาง' ? 'p-medium' : 'p-low');
                const dateFormated = new Date(t.deadline).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });

                const item = document.createElement('div');
                item.className = 'task-item';
                if (t.status === 'เสร็จแล้ว') item.style.opacity = '0.6';

                item.innerHTML = `
                    <div class="task-header">
                        <div>
                            <span class="priority-badge ${pClass}">ความสำคัญ: ${t.priority}</span>
                            <div class="task-title" style="${t.status === 'เสร็จแล้ว' ? 'text-decoration: line-through;' : ''}">${t.name}</div>
                        </div>
                        <div>
                            <select style="width:auto; padding:4px;" onchange="updateStatus('${t.id}', this.value)">
                                <option value="ยังไม่ทำ" ${t.status === 'ยังไม่ทำ' ? 'selected' : ''}>ยังไม่ทำ</option>
                                <option value="กำลังทำ" ${t.status === 'กำลังทำ' ? 'selected' : ''}>กำลังทำ</option>
                                <option value="เสร็จแล้ว" ${t.status === 'เสร็จแล้ว' ? 'selected' : ''}>เสร็จแล้ว</option>
                            </select>
                        </div>
                    </div>
                    <div class="task-details">📚 วิชา: ${t.subject} | 📅 ส่งภายใน: ${dateFormated}</div>
                    <div class="task-actions">
                        <button class="btn-small btn-edit" onclick="editTask('${t.id}')">แก้ไข</button>
                        <button class="btn-small btn-delete" onclick="deleteTask('${t.id}')">ลบ</button>
                    </div>
                `;
                listDiv.appendChild(item);
            });
        }
        calculateDashboard();
    }

    // คำนวณสถิติแสดงผลบนแดชบอร์ด
    function calculateDashboard() {
        const total = tasks.length;
        const completed = tasks.filter(t => t.status === 'เสร็จแล้ว').length;
        const pending = total - completed;

        // ค้นหางานเร่งด่วนในระยะ 3 วัน
        const today = new Date(); today.setHours(0,0,0,0);
        const limitDay = new Date(today); limitDay.setDate(today.getDate() + 3);

        const urgent = tasks.filter(t => {
            if (t.status === 'เสร็จแล้ว') return false;
            const d = new Date(t.deadline);
            return d >= today && d <= limitDay;
        }).length;

        // นับงานตามรายวิชา
        const subMap = {};
        tasks.forEach(t => {
            if (!subMap[t.subject]) subMap[t.subject] = { total: 0, done: 0 };
            subMap[t.subject].total++;
            if (t.status === 'เสร็จแล้ว') subMap[t.subject].done++;
        });

        let subHTML = '';
        for (const s in subMap) { subHTML += `📌 ${s}: เสร็จ ${subMap[s].done}/${subMap[s].total}<br>`; }

        document.getElementById('dashTotal').innerText = total;
        document.getElementById('dashPending').innerText = pending;
        document.getElementById('dashCompleted').innerText = completed;
        document.getElementById('dashUrgent').innerText = urgent;
        document.getElementById('dashSubjects').innerHTML = subHTML || 'ชิลล์ ไม่มีวิชาค้าง';
    }
</script>
</body>
</html>
